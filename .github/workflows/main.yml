name: Compilar TWRP - Poco C40 (frost)

on:
  workflow_dispatch: # Botão para iniciar manualmente

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Maximizar espaço em disco
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        swap-size-mb: 6144
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Instalar Dependências
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 gcc clang-12 libssl-dev repo
        
    - name: Configurar Git
      run: |
        git config --global user.name "Fakezay"
        git config --global user.email "fakezaydev@gmail.com"

    - name: Sincronizar Manifesto TWRP (AOSP 11)
      run: |
        mkdir ~/twrp
        cd ~/twrp
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
        repo sync -j$(nproc --all) --force-sync

    - name: Clonar sua Device Tree
      run: |
        cd ~/twrp
        # Clonamos o teu repo direto para a pasta correta do dispositivo
        git clone https://github.com/Fakezay/twrp_frost device/xiaomi/frost

    - name: Compilar RecoveryImage
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        . build/envsetup.sh
        lunch omni_frost-eng
        mka recoveryimage -j$(nproc --all)

    - name: Upload do Recovery pronto
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-frost-PocoC40
        path: /home/runner/twrp/out/target/product/frost/recovery.img

