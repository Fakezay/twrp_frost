name: Compilar TWRP - Poco C40 (Final v3)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 🧹 Limpeza de Espaço
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        overprovision-lvm: 'true'

    - name: 🐳 Compilar (Link LineageOS)
      run: |
        docker pull ubuntu:20.04
        
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ubuntu:20.04 /bin/bash -c "
          # 1. Instalar Ferramentas
          apt-get update && \
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig python2 python3 rsync sudo wget && \
          
          ln -s /usr/bin/python2 /usr/bin/python && \

          # 2. Setup Repo
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/bin/repo && \
          chmod a+x /usr/bin/repo && \
          git config --global user.name 'Fakezay' && \
          git config --global user.email 'fakezaydev@gmail.com' && \

          # 3. Baixar Fontes
          mkdir twrp && cd twrp && \
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 && \
          repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j$(nproc --all) && \

          # 4. Clonar Device Tree e EXTRAIR KERNEL
          git clone https://github.com/Fakezay/twrp_frost device/xiaomi/frost && \
          
          echo 'Baixando extrator (Link LineageOS)...' && \
          cd device/xiaomi/frost && \
          # Link direto da LineageOS que é 100% garantido
          wget https://raw.githubusercontent.com/LineageOS/android_system_tools_mkbootimg/lineage-19.1/unpack_bootimg.py -O unpack_bootimg.py && \
          chmod +x unpack_bootimg.py && \
          
          echo 'Extraindo Kernel do boot.img...' && \
          python3 unpack_bootimg.py --boot_img boot.img --out . && \
          
          # Confere se o arquivo 'kernel' apareceu
          ls -l kernel && \
          cd ../../.. && \

          # 5. Compilar BootImage (TWRP)
          export ALLOW_MISSING_DEPENDENCIES=true && \
          . build/envsetup.sh && \
          lunch omni_frost-eng && \
          mka bootimage -j$(nproc --all) && \
          
          # Copiar o boot.img gerado
          cp out/target/product/frost/boot.img /workspace/twrp-boot.img
        "

    - name: 📤 Upload do TWRP Pronto
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-BOOT-PocoC40
        path: twrp-boot.img
