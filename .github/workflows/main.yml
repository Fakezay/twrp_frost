name: Compilar TWRP - Poco C40 (frost)

on:
  workflow_dispatch:

jobs:
  build:
    # Usamos o servidor mais recente para pegar a fila rápida
    runs-on: ubuntu-latest
    # MAS rodamos tudo dentro de uma caixa com Ubuntu 20.04 (compatível com Android 11)
    container:
      image: ubuntu:20.04

    steps:
    - name: Configurar Ambiente do Container
      run: |
        # Atualiza o container e instala o básico para não dar erro de certificado
        apt-get update
        apt-get install -y software-properties-common
        # Força fuso horário para não travar perguntando região
        export DEBIAN_FRONTEND=noninteractive
        ln -fs /usr/share/zoneinfo/America/Sao_Paulo /etc/localtime
        dpkg-reconfigure --frontend noninteractive tzdata

    - name: Maximizar espaço (Não funciona em container, pulando passo)
      # Em containers, geralmente já temos espaço suficiente ou esse script falha.
      # Vamos pular direto para a instalação.
      run: echo "Rodando em container, pulando limpeza de disco."

    - name: Instalar Dependências (Android 11)
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python2 python3
        
        # O Android 11 precisa do comando 'python', mas o Ubuntu traz 'python3' ou 'python2'
        ln -s /usr/bin/python2 /usr/bin/python || true

    - name: Configurar Git e Repo
      run: |
        git config --global user.name "Fakezay"
        git config --global user.email "fakezaydev@gmail.com"
        # Instalar o comando repo manualmente
        curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/bin/repo
        chmod a+x /usr/bin/repo

    - name: Sincronizar Código
      run: |
        mkdir -p /github/workspace/twrp
        cd /github/workspace/twrp
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
        repo sync -j$(nproc --all) --force-sync

    - name: Clonar sua Device Tree
      run: |
        cd /github/workspace/twrp
        # Clona o teu repositório
        git clone https://github.com/Fakezay/twrp_frost device/xiaomi/frost

    - name: Compilar Recovery
      run: |
        cd /github/workspace/twrp
        # Permite usar root (o container roda como root)
        export ALLOW_MISSING_DEPENDENCIES=true
        export FORCE_UNSAFE_CONFIGURE=1
        
        . build/envsetup.sh
        lunch omni_frost-eng
        mka recoveryimage -j$(nproc --all)

    - name: Upload do Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-frost-PocoC40
        path: /github/workspace/twrp/out/target/product/frost/recovery.img
