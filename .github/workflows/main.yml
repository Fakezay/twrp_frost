name: Compilar TWRP - Poco C40 (frost)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # --- A SOLUÇÃO DO PROBLEMA DE ESPAÇO ---
    - name: 🧹 Limpeza Profunda (Maximize Build Space)
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        overprovision-lvm: 'true'

    - name: Verificar Espaço Livre
      run: |
        echo "Espaço disponível após limpeza:"
        df -h
    # ---------------------------------------

    - name: 🐳 Compilar dentro do Docker (Ubuntu 20.04)
      run: |
        # Baixa a imagem limpa
        docker pull ubuntu:20.04
        
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ubuntu:20.04 /bin/bash -c "
          # 1. Preparar Ambiente
          apt-get update && \
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig python2 python3 rsync sudo && \
          
          ln -s /usr/bin/python2 /usr/bin/python && \

          # 2. Repo e Git
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/bin/repo && \
          chmod a+x /usr/bin/repo && \
          git config --global user.name 'Fakezay' && \
          git config --global user.email 'fakezaydev@gmail.com' && \

          # 3. Sync (Otimizado para economizar espaço)
          mkdir twrp && cd twrp && \
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11 && \
          repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j$(nproc --all) && \

          # 4. Clonar Device Tree
          git clone https://github.com/Fakezay/twrp_frost device/xiaomi/frost && \

          # 5. Compilar
          export ALLOW_MISSING_DEPENDENCIES=true && \
          . build/envsetup.sh && \
          lunch omni_frost-eng && \
          mka recoveryimage -j$(nproc --all) && \
          
          # Copiar resultado para fora do container
          cp out/target/product/frost/recovery.img /workspace/recovery.img
        "

    - name: 📤 Upload do Resultado
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-frost-PocoC40
        path: recovery.img
